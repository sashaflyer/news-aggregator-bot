[topics.github_trending]
kind = "general"
sources = ["github"]
# Keywords that signal quality AI/ML engineering discussions. GitHub search
# returns issues+PRs sorted by reactions, so specific technical terms produce
# better signal than broad queries like "AI".
github_keywords = [
  "inference",       # deployment, serving, vLLM, TGI, llama.cpp, TensorRT
  "fine-tuning",     # LoRA, QLoRA, PEFT, training infrastructure
  "RAG",             # retrieval augmented generation
  "agent",           # AI agents, tool use, function calling
  "transformer",     # architecture, implementation
  "quantization",    # GGUF, GPTQ, AWQ, model compression
  "CUDA",            # GPU programming, kernels, Triton
  "diffusion",       # image generation, Stable Diffusion
]
prompt_template = "github_trending.md"
top_n = 15
schedule = "20 5,17 * * *"
